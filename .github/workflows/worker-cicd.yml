name: Worker CI/CD

on:
  push:
    branches:
      - main

concurrency:
  group: worker-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Worker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Wrangler
        run: npm install --global wrangler@4.78.0

      - name: Prepare worker entry
        run: cp "明文源吗" "_worker.js"

      - name: Validate wrangler version
        run: wrangler --version

      - name: Dry run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_ENV_U: ${{ secrets.CF_ENV_U }}
        run: |
          test -n "$CF_WORKER_NAME"
          test -n "$CF_KV_NAMESPACE_ID"
          test -n "$CF_ENV_U"

          cat > wrangler.ci.json <<EOF
          {
            "name": "${CF_WORKER_NAME}",
            "main": "_worker.js",
            "compatibility_date": "2026-01-20",
            "kv_namespaces": [
              {
                "binding": "C",
                "id": "${CF_KV_NAMESPACE_ID}"
              }
            ],
            "vars": {
              "u": "${CF_ENV_U}"
            }
          }
          EOF

          wrangler deploy --config wrangler.ci.json --dry-run

  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Wrangler
        run: npm install --global wrangler@4.78.0

      - name: Prepare worker entry
        run: cp "明文源吗" "_worker.js"

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_ENV_U: ${{ secrets.CF_ENV_U }}
        run: |
          test -n "$CF_WORKER_NAME"
          test -n "$CF_KV_NAMESPACE_ID"
          test -n "$CF_ENV_U"

          cat > wrangler.ci.json <<EOF
          {
            "name": "${CF_WORKER_NAME}",
            "main": "_worker.js",
            "compatibility_date": "2026-01-20",
            "kv_namespaces": [
              {
                "binding": "C",
                "id": "${CF_KV_NAMESPACE_ID}"
              }
            ],
            "vars": {
              "u": "${CF_ENV_U}"
            }
          }
          EOF

          wrangler deploy --config wrangler.ci.json
