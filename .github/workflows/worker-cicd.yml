name: Worker CI/CD

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

concurrency:
  group: worker-cicd-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Worker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Wrangler
        run: npm install --global wrangler@4.78.0

      - name: Install Obfuscator
        run: npm install javascript-obfuscator

      - name: Build random obfuscated worker
        run: |
          cat > obfuscate-random.js <<'EOF'
          const JavaScriptObfuscator = require("javascript-obfuscator");
          const fs = require("fs");

          const sourceFile = "明文源吗";
          const outputFile = "_worker.js";
          const profileFile = "obfuscation-profile.json";

          function pick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
          }

          if (!fs.existsSync(sourceFile)) {
            throw new Error(`Missing source file: ${sourceFile}`);
          }

          const code = fs.readFileSync(sourceFile, "utf8");
          if (!code || !code.trim()) {
            throw new Error(`Source file is empty: ${sourceFile}`);
          }

          const options = {
            compact: true,
            controlFlowFlattening: pick([false, true]),
            controlFlowFlatteningThreshold: pick([0, 0.3, 0.5]),
            deadCodeInjection: pick([false, true]),
            deadCodeInjectionThreshold: pick([0, 0.2, 0.4]),
            stringArray: true,
            stringArrayEncoding: pick([[], ["base64"], ["rc4"]]),
            stringArrayThreshold: pick([0.75, 1]),
            stringArrayRotate: true,
            stringArrayShuffle: true,
            stringArrayWrappersCount: pick([1, 2, 3]),
            renameGlobals: pick([false, true]),
            identifierNamesGenerator: pick(["hexadecimal", "mangled", "mangled-shuffled"]),
            numbersToExpressions: pick([false, true]),
            simplify: pick([false, true]),
            splitStrings: pick([false, true]),
            splitStringsChunkLength: pick([3, 5, 8]),
            transformObjectKeys: pick([false, true]),
            unicodeEscapeSequence: pick([false, true]),
            selfDefending: false,
            debugProtection: false,
            disableConsoleOutput: pick([false, true]),
            ignoreImports: false,
            target: "browser",
          };

          const obfuscatedCode = JavaScriptObfuscator.obfuscate(code, options).getObfuscatedCode();
          fs.writeFileSync(outputFile, obfuscatedCode, "utf8");
          fs.writeFileSync(profileFile, JSON.stringify(options, null, 2), "utf8");
          console.log("Obfuscation profile:");
          console.log(JSON.stringify(options));
          EOF
          node obfuscate-random.js

      - name: Validate wrangler version
        run: wrangler --version

      - name: Dry run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_ENV_U: ${{ secrets.CF_ENV_U }}
        run: |
          test -n "$CF_WORKER_NAME"
          test -n "$CF_KV_NAMESPACE_ID"
          test -n "$CF_ENV_U"

          cat > wrangler.ci.json <<EOF
          {
            "name": "${CF_WORKER_NAME}",
            "main": "_worker.js",
            "compatibility_date": "2026-01-20",
            "kv_namespaces": [
              {
                "binding": "C",
                "id": "${CF_KV_NAMESPACE_ID}"
              }
            ],
            "vars": {
              "u": "${CF_ENV_U}"
            }
          }
          EOF

          wrangler deploy --config wrangler.ci.json --dry-run

      - name: Upload obfuscated artifact
        uses: actions/upload-artifact@v4
        with:
          name: obfuscated-worker
          path: |
            _worker.js
            obfuscation-profile.json

  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Wrangler
        run: npm install --global wrangler@4.78.0

      - name: Download obfuscated artifact
        uses: actions/download-artifact@v4
        with:
          name: obfuscated-worker
          path: .

      - name: Show obfuscation profile
        run: cat obfuscation-profile.json

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_ENV_U: ${{ secrets.CF_ENV_U }}
        run: |
          test -n "$CF_WORKER_NAME"
          test -n "$CF_KV_NAMESPACE_ID"
          test -n "$CF_ENV_U"

          cat > wrangler.ci.json <<EOF
          {
            "name": "${CF_WORKER_NAME}",
            "main": "_worker.js",
            "compatibility_date": "2026-01-20",
            "kv_namespaces": [
              {
                "binding": "C",
                "id": "${CF_KV_NAMESPACE_ID}"
              }
            ],
            "vars": {
              "u": "${CF_ENV_U}"
            }
          }
          EOF

          wrangler deploy --config wrangler.ci.json
