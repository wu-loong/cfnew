name: Worker CI/CD

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

concurrency:
  group: worker-cicd-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Worker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Wrangler
        run: npm install --global wrangler@4.78.0

      - name: Install Obfuscator
        run: npm install javascript-obfuscator

      - name: Build random obfuscated worker
        run: |
          cat > obfuscate-random.js <<'EOF'
          const JavaScriptObfuscator = require("javascript-obfuscator");
          const fs = require("fs");

          const sourceFile = "明文源吗";
          const outputFile = "_worker.js";
          const profileFile = "obfuscation-profile.json";

          if (!fs.existsSync(sourceFile)) {
            throw new Error(`Missing source file: ${sourceFile}`);
          }

          const code = fs.readFileSync(sourceFile, "utf8");
          if (!code || !code.trim()) {
            throw new Error(`Source file is empty: ${sourceFile}`);
          }

          const options = {
            compact: true,
            controlFlowFlattening: false,
            controlFlowFlatteningThreshold: 0,
            deadCodeInjection: false,
            deadCodeInjectionThreshold: 0,
            stringArray: true,
            stringArrayEncoding: ["base64"],
            stringArrayThreshold: 1,
            stringArrayRotate: true,
            stringArrayShuffle: true,
            stringArrayWrappersChainedCalls: false,
            stringArrayWrappersParametersMaxCount: 3,
            renameGlobals: true,
            identifierNamesGenerator: "mangled-shuffled",
            identifierNamesCache: null,
            identifiersPrefix: "",
            renameProperties: false,
            renamePropertiesMode: "safe",
            numbersToExpressions: false,
            simplify: false,
            splitStrings: true,
            splitStringsChunkLength: 1,
            transformObjectKeys: false,
            selfDefending: false,
            debugProtection: false,
            debugProtectionInterval: 0,
            disableConsoleOutput: true,
            ignoreImports: false,
            target: "browser",
          };

          // Randomly choose one tested-safe profile each run.
          const profileName = Math.random() < 0.5 ? "profile_a" : "profile_b";
          if (profileName === "profile_a") {
            options.stringArrayWrappersCount = 2;
            options.unicodeEscapeSequence = true;
          } else {
            options.stringArrayWrappersCount = 1;
            options.unicodeEscapeSequence = false;
          }

          const obfuscatedCode = JavaScriptObfuscator.obfuscate(code, options).getObfuscatedCode();
          fs.writeFileSync(outputFile, obfuscatedCode, "utf8");
          fs.writeFileSync(profileFile, JSON.stringify({ profileName, options }, null, 2), "utf8");
          console.log("Obfuscation profile:");
          console.log(JSON.stringify({ profileName, options }));
          EOF
          node obfuscate-random.js

      - name: Validate wrangler version
        run: wrangler --version

      - name: Dry run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_ENV_U: ${{ secrets.CF_ENV_U }}
        run: |
          test -n "$CF_WORKER_NAME"
          test -n "$CF_KV_NAMESPACE_ID"
          test -n "$CF_ENV_U"

          cat > wrangler.ci.json <<EOF
          {
            "name": "${CF_WORKER_NAME}",
            "main": "_worker.js",
            "compatibility_date": "2026-01-20",
            "kv_namespaces": [
              {
                "binding": "C",
                "id": "${CF_KV_NAMESPACE_ID}"
              }
            ],
            "vars": {
              "u": "${CF_ENV_U}"
            }
          }
          EOF

          wrangler deploy --config wrangler.ci.json --dry-run

      - name: Upload obfuscated artifact
        uses: actions/upload-artifact@v4
        with:
          name: obfuscated-worker
          path: |
            _worker.js
            obfuscation-profile.json

  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Wrangler
        run: npm install --global wrangler@4.78.0

      - name: Download obfuscated artifact
        uses: actions/download-artifact@v4
        with:
          name: obfuscated-worker
          path: .

      - name: Show obfuscation profile
        run: cat obfuscation-profile.json

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_ENV_U: ${{ secrets.CF_ENV_U }}
        run: |
          test -n "$CF_WORKER_NAME"
          test -n "$CF_KV_NAMESPACE_ID"
          test -n "$CF_ENV_U"

          cat > wrangler.ci.json <<EOF
          {
            "name": "${CF_WORKER_NAME}",
            "main": "_worker.js",
            "compatibility_date": "2026-01-20",
            "kv_namespaces": [
              {
                "binding": "C",
                "id": "${CF_KV_NAMESPACE_ID}"
              }
            ],
            "vars": {
              "u": "${CF_ENV_U}"
            }
          }
          EOF

          wrangler deploy --config wrangler.ci.json
